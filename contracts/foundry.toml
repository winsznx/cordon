[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[rpc_endpoints]
monad = "${MONAD_RPC_URL}"

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
